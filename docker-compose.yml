# OffplanIQ — Docker Compose
# Uses your Supabase Cloud project (keys from .env file)
# No local Postgres needed — Supabase handles DB, Auth, Edge Functions
#
# Usage:
#   docker compose up              # Start web app
#   docker compose up -d           # Start in background
#   docker compose --profile scraper up   # Include scraper
#   docker compose --profile stripe up    # Include Stripe CLI
#   docker compose down            # Stop everything
#
# Prerequisites:
#   1. Fill in .env with your Supabase + Stripe keys
#   2. Run migrations on Supabase: supabase db push
#   3. Seed data: pnpm run seed

services:
  # ─────────────────────────────────────────────
  # Next.js Web App (http://localhost:3000)
  # Connects to Supabase Cloud via .env keys
  # ─────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: offplaniq-web
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/node_modules
      - /app/node_modules
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Python Scraper (opt-in: --profile scraper)
  # Connects to Supabase Cloud via .env keys
  # ─────────────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: docker/scraper.Dockerfile
    container_name: offplaniq-scraper
    environment:
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    env_file: .env
    volumes:
      - ./apps/scraper:/app
    profiles:
      - scraper

  # ─────────────────────────────────────────────
  # Polling Daemon — continuously scrapes PF every 6 hours
  # docker compose --profile poller up -d
  # ─────────────────────────────────────────────
  poller:
    build:
      context: .
      dockerfile: docker/scraper.Dockerfile
    container_name: offplaniq-poller
    command: python jobs/polling_daemon.py --interval ${POLL_INTERVAL_S:-21600}
    env_file: .env
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      POLL_INTERVAL_S: ${POLL_INTERVAL_S:-21600}
      POLL_CITIES: ${POLL_CITIES:-dubai,abu-dhabi,ras-al-khaimah}
    volumes:
      - ./apps/scraper:/app
    profiles:
      - poller
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Stripe CLI Webhook Listener (opt-in: --profile stripe)
  # Forwards Stripe events → http://web:3000/api/webhooks/stripe
  # ─────────────────────────────────────────────
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: offplaniq-stripe
    command: listen --forward-to http://web:3000/api/webhooks/stripe --api-key ${STRIPE_SECRET_KEY}
    depends_on:
      - web
    env_file: .env
    profiles:
      - stripe
    restart: unless-stopped
