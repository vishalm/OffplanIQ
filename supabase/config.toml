project_id = "offplaniq"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://offplaniq.com", "https://offplaniq.vercel.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # set true in production

[auth.external.google]
enabled = false   # enable when ready: add GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

[functions.score-recalculator]
verify_jwt = false   # called by scraper with service key

[functions.alert-dispatcher]
verify_jwt = false

[functions.digest-sender]
verify_jwt = false

[functions.psf-updater]
verify_jwt = false
