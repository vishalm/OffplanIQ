<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <linearGradient id="sf-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="sf-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/><stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="sf-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/><stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="sf-teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/><stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="sf-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/><stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>

  <rect width="900" height="280" rx="16" fill="url(#sf-bg)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="monospace" font-size="16" fill="#94a3b8" font-weight="600">PROJECT SCORE (0-100)</text>

  <!-- Component boxes -->
  <!-- Sell-through -->
  <rect x="30" y="65" width="195" height="120" rx="12" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="128" y="92" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#60a5fa">SELL-THROUGH</text>
  <text x="128" y="120" text-anchor="middle" font-family="monospace" font-size="32" font-weight="800" fill="url(#sf-blue)">40</text>
  <text x="128" y="142" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">points max</text>
  <rect x="55" y="155" width="146" height="20" rx="10" fill="#3b82f6" opacity="0.15"/>
  <text x="128" y="169" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#60a5fa" font-weight="500">Demand Proof</text>

  <!-- + sign -->
  <text x="245" y="135" text-anchor="middle" font-family="monospace" font-size="28" fill="#475569">+</text>

  <!-- PSF Delta -->
  <rect x="260" y="65" width="195" height="120" rx="12" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="358" y="92" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#a78bfa">PSF DELTA 6M</text>
  <text x="358" y="120" text-anchor="middle" font-family="monospace" font-size="32" font-weight="800" fill="url(#sf-purple)">30</text>
  <text x="358" y="142" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">points max</text>
  <rect x="285" y="155" width="146" height="20" rx="10" fill="#8b5cf6" opacity="0.15"/>
  <text x="358" y="169" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a78bfa" font-weight="500">Price Momentum</text>

  <!-- + sign -->
  <text x="475" y="135" text-anchor="middle" font-family="monospace" font-size="28" fill="#475569">+</text>

  <!-- Developer -->
  <rect x="490" y="65" width="195" height="120" rx="12" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="588" y="92" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#22d3ee">DEVELOPER</text>
  <text x="588" y="120" text-anchor="middle" font-family="monospace" font-size="32" font-weight="800" fill="url(#sf-teal)">20</text>
  <text x="588" y="142" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">points max</text>
  <rect x="515" y="155" width="146" height="20" rx="10" fill="#06b6d4" opacity="0.15"/>
  <text x="588" y="169" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#22d3ee" font-weight="500">Execution Trust</text>

  <!-- + sign -->
  <text x="705" y="135" text-anchor="middle" font-family="monospace" font-size="28" fill="#475569">+</text>

  <!-- Handover -->
  <rect x="720" y="65" width="150" height="120" rx="12" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="795" y="92" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#34d399">HANDOVER</text>
  <text x="795" y="120" text-anchor="middle" font-family="monospace" font-size="32" font-weight="800" fill="url(#sf-green)">10</text>
  <text x="795" y="142" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">points max</text>
  <rect x="735" y="155" width="120" height="20" rx="10" fill="#10b981" opacity="0.15"/>
  <text x="795" y="169" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#34d399" font-weight="500">Delivery Risk</text>

  <!-- Score labels bar -->
  <rect x="30" y="210" width="840" height="50" rx="12" fill="#1e293b" opacity="0.6"/>
  <rect x="30" y="210" width="126" height="50" rx="12" fill="#dc2626" opacity="0.12"/>
  <text x="93" y="232" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#f87171">AVOID</text>
  <text x="93" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">0-39</text>

  <rect x="156" y="210" width="168" height="50" rx="0" fill="#f97316" opacity="0.12"/>
  <text x="240" y="232" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fb923c">CAUTION</text>
  <text x="240" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">40-54</text>

  <rect x="324" y="210" width="168" height="50" rx="0" fill="#eab308" opacity="0.12"/>
  <text x="408" y="232" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#facc15">WATCH</text>
  <text x="408" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">55-69</text>

  <rect x="492" y="210" width="168" height="50" rx="0" fill="#22c55e" opacity="0.12"/>
  <text x="576" y="232" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#4ade80">GOOD</text>
  <text x="576" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">70-84</text>

  <rect x="660" y="210" width="210" height="50" rx="12" fill="#16a34a" opacity="0.15"/>
  <text x="765" y="232" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#22c55e">EXCELLENT</text>
  <text x="765" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">85-100</text>
</svg>
