<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/><line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/><line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/><line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Decorative chart bars (right side) -->
  <g transform="translate(820, 60)" opacity="0.15">
    <rect x="0" y="120" width="40" height="200" rx="4" fill="url(#teal)"/>
    <rect x="55" y="80" width="40" height="240" rx="4" fill="url(#teal)"/>
    <rect x="110" y="40" width="40" height="280" rx="4" fill="url(#accent)"/>
    <rect x="165" y="100" width="40" height="220" rx="4" fill="url(#accent)"/>
    <rect x="220" y="60" width="40" height="260" rx="4" fill="url(#teal)"/>
    <rect x="275" y="140" width="40" height="180" rx="4" fill="url(#teal)"/>
  </g>

  <!-- Trend line glow -->
  <path d="M830 240 L890 200 L950 120 L1010 160 L1070 100 L1130 130"
        stroke="url(#accent)" stroke-width="4" stroke-linecap="round" fill="none"
        filter="url(#glow)" opacity="0.6"/>

  <!-- Icon bars -->
  <g transform="translate(80, 130)">
    <rect x="0" y="60" width="20" height="80" rx="4" fill="url(#teal)" opacity="0.6"/>
    <rect x="28" y="36" width="20" height="104" rx="4" fill="url(#teal)" opacity="0.8"/>
    <rect x="56" y="8" width="20" height="132" rx="4" fill="url(#accent)"/>
    <rect x="84" y="44" width="20" height="96" rx="4" fill="url(#accent)" opacity="0.7"/>
    <path d="M10 80 L38 52 L66 20 L94 48" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <circle cx="66" cy="20" r="6" fill="#3b82f6"/>
  </g>

  <!-- Title -->
  <text x="80" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="#f1f5f9">
    Offplan<tspan fill="url(#accent)">IQ</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="305" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#94a3b8" font-weight="400">
    Dubai Off-Plan Property Intelligence Platform
  </text>

  <!-- Feature pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500">
    <rect x="80" y="325" width="130" height="30" rx="15" fill="#3b82f6" opacity="0.15"/>
    <text x="100" y="345" fill="#60a5fa">142+ Projects</text>

    <rect x="225" y="325" width="140" height="30" rx="15" fill="#8b5cf6" opacity="0.15"/>
    <text x="245" y="345" fill="#a78bfa">PSF Analytics</text>

    <rect x="380" y="325" width="140" height="30" rx="15" fill="#06b6d4" opacity="0.15"/>
    <text x="400" y="345" fill="#22d3ee">IRR Calculator</text>

    <rect x="535" y="325" width="150" height="30" rx="15" fill="#10b981" opacity="0.15"/>
    <text x="555" y="345" fill="#34d399">Score Engine</text>
  </g>

  <!-- Accent line bottom -->
  <rect x="80" y="390" width="200" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
